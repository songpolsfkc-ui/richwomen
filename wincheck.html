<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Win Check - Rich Women</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav-sidebar">
        <div class="logo-animate">
            <div class="rabbit">🪙</div>
            <div class="text">Rich Women</div>
        </div>
        <a href="index.html"><div class="nav-item">🏠<br>Key Number</div></a>
        <a href="report.html"><div class="nav-item">📊<br>Limit Check</div></a>
        <a href="money.html"><div class="nav-item">💰<br>Money Report</div></a>
        <a href="wincheck.html"><div class="nav-item">🏆<br>Win Check</div></a>
        <a href="settings.html"><div class="nav-item">⚙️<br>Limit Setting</div></a>
    </div>

    <div class="main-content">
    <div class="card-padding" style="background:white; border-radius:15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 900px; margin: auto;">
        <h2 style="margin-top:0; color: var(--navy-dark);">🏆 ตรวจรางวัลประจำงวด</h2>
        
        <div style="background: #f8fafc; padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #e2e8f0;">
            <div class="input-grid" style="grid-template-columns: 2fr 1fr 1fr 1fr; gap: 15px;">
                <div>
                    <label style="font-weight: bold; color: var(--blue);">รางวัลที่ 1 (6 หลัก)</label>
                    <input type="text" id="winFull1" placeholder="เช่น 123456" maxlength="6" style="font-size: 1.2rem; border: 2px solid var(--blue);">
                </div>
                <div>
                    <label style="font-weight: bold; color: var(--red);">เลขท้าย 2 ตัว</label>
                    <input type="text" id="winDown2" placeholder="เช่น 45" maxlength="2" style="font-size: 1.2rem; border: 2px solid var(--red);">
                </div>
                <div>
                    <label>เลขท้าย 3 ตัว (1)</label>
                    <input type="text" id="winDown3_1" placeholder="เช่น 789" maxlength="3">
                </div>
                <div>
                    <label>เลขท้าย 3 ตัว (2)</label>
                    <input type="text" id="winDown3_2" placeholder="เช่น 012" maxlength="3">
                </div>
            </div>
            <button onclick="processWinCheck()" class="btn-submit" style="background: var(--navy-dark); margin-top: 20px; width: 100%; height: 50px; font-size: 1.1rem;">
                🔍 ตรวจสอบรายชื่อผู้โชคดี
            </button>
        </div>

        <div id="summaryNumbers" style="display:none;">
    <span class="headline">✨ ผลรางวัลอย่างเป็นทางการ ✨</span>
    <div id="txtResult">
        </div>
</div>

        <div id="winResultSection" style="display: none;">
            <h3 style="color: var(--green); border-bottom: 2px solid #dcfce7; padding-bottom: 10px;">🎊 รายการผู้ถูกรางวัล</h3>
            <div id="winGroupContainer">
                </div>
        </div>
    </div>
</div>
    <script src="app.js"></script>
</body>
</html>
