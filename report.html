<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Check - Ultra Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="nav-sidebar">
<div class="logo-animate">
    <div class="rabbit">🪙</div>
    <div class="text">Rich Women</div>
</div>
        <a href="index.html"><div class="nav-item">🏠<br>Key Number</div></a>
        <a href="report.html"><div class="nav-item">📊<br>Limit Check</div></a>
        <a href="money.html"><div class="nav-item">💰<br>Money Report</div></a>
        <a href="settings.html"><div class="nav-item">⚙️<br>Limit Setting</div></a>
    </div>
    <div class="main-content">
        <div class="card-padding" style="background:white; border-radius:15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2 style="margin:0;">📊 Check (ยอดสะสมแยกเลข)</h2>
    <div style="display: flex; gap: 10px; align-items: center;">
        <label for="typeFilter" style="font-weight: bold;">กรองประเภท:</label>
        <select id="typeFilter" onchange="renderReport()" style="padding: 8px; border-radius: 8px; border: 1px solid #ddd; cursor:pointer;">
            <option value="all">ทั้งหมด</option>
            <option value="2ตัวบน">2ตัวบน</option>
            <option value="2ตัวล่าง">2ตัวล่าง</option>
            <option value="3ตัวบน">3ตัวบน</option>
            <option value="3ตัวโต๊ด">3ตัวโต๊ด</option>
            <option value="3ตัวล่าง">3ตัวล่าง</option>
            <option value="วิ่งบน">วิ่งบน</option>
            <option value="วิ่งล่าง">วิ่งล่าง</option>
        </select>
        
        <button onclick="exportReportToExcel()" style="background:#1d6f42; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">📥 Excel Report</button>
        <button onclick="clearGrandReport()" style="background:var(--red); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">ล้างงวดนี้</button>
    </div>
</div>
            <table style="table-layout: fixed; width: 100%;">
    <thead>
        <tr>
            <th style="text-align: left; padding-left:20px; width: 15%;">เลข</th>
            <th style="text-align: center; width: 25%;">ประเภท</th>
            <th style="text-align: right; width: 20%;">ยอดสะสม</th>
            <th style="text-align: right; width: 20%;">เพดาน</th>
            <th style="text-align: right; padding-right:20px; width: 20%;">ส่วนต่าง (เกิน)</th>
        </tr>
    </thead>
    <tbody id="reportBody"></tbody>
</table>
        </div>
    </div>
    <script src="app.js"></script>
    <script>renderReport();</script>
</body>
</html>
